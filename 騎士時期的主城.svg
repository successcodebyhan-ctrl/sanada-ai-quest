<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .bg { fill: #d0d0d0; }
      .stone-dark { fill: #4a4a4a; }
      .stone-light { fill: #6a6a6a; }
      .stone-lighter { fill: #8a8a8a; }
      .stone-pale { fill: #b0b0b0; }
      .wood-dark { fill: #5a3a1a; }
      .wood-brown { fill: #7a4a2a; }
      .wood-light { fill: #9a6a3a; }
      .band-color { fill: #b5622a; }
      .roof-dark { fill: #8b3a2a; }
      .roof-mid { fill: #c0392b; }
      .roof-light { fill: #e67e22; }
      .roof-pale { fill: #f5a962; }
      .no-fill { fill: none; }
      .outline { stroke: #2a2a2a; stroke-width: 1; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="640" height="640" class="bg" />

  <!-- ═══ 左角樓 ═══════════════════════════════════════ -->
  <g id="left-corner-tower">
    <!-- 塔身（深灰磚） -->
    <rect x="80" y="300" width="120" height="240" class="stone-dark" />

    <!-- 磚塊紋路 -->
    <g class="stone-light" opacity="0.6">
      <!-- 水平磚線 -->
      <line x1="80" y1="340" x2="200" y2="340" stroke-width="2" />
      <line x1="80" y1="380" x2="200" y2="380" stroke-width="2" />
      <line x1="80" y1="420" x2="200" y2="420" stroke-width="2" />
      <line x1="80" y1="460" x2="200" y2="460" stroke-width="2" />
      <line x1="80" y1="500" x2="200" y2="500" stroke-width="2" />
      <line x1="80" y1="540" x2="200" y2="540" stroke-width="2" />
      <!-- 垂直磚線 -->
      <line x1="120" y1="300" x2="120" y2="540" stroke-width="2" />
      <line x1="160" y1="300" x2="160" y2="540" stroke-width="2" />
    </g>

    <!-- 城垛（上方鋸齒） -->
    <g class="stone-dark">
      <!-- 齒 1 -->
      <rect x="80" y="260" width="30" height="40" />
      <!-- 齒 2 -->
      <rect x="120" y="260" width="30" height="40" />
      <!-- 齒 3 -->
      <rect x="160" y="260" width="40" height="40" />
    </g>
    <!-- 城垛縫隙 -->
    <g class="bg">
      <rect x="110" y="260" width="10" height="40" />
      <rect x="150" y="260" width="10" height="40" />
    </g>
  </g>

  <!-- ═══ 左城牆 ═══════════════════════════════════════ -->
  <g id="left-wall">
    <!-- 城牆主體 -->
    <rect x="200" y="360" width="80" height="180" class="stone-dark" />

    <!-- 磚塊紋路 -->
    <g class="stone-light" opacity="0.6">
      <line x1="200" y1="400" x2="280" y2="400" stroke-width="2" />
      <line x1="200" y1="440" x2="280" y2="440" stroke-width="2" />
      <line x1="200" y1="480" x2="280" y2="480" stroke-width="2" />
      <line x1="200" y1="520" x2="280" y2="520" stroke-width="2" />
      <line x1="240" y1="360" x2="240" y2="540" stroke-width="2" />
    </g>
  </g>

  <!-- ═══ 中央主塔 ═══════════════════════════════════════ -->
  <g id="main-tower">
    <!-- 第一層：城門層 -->
    <g id="gate-layer">
      <!-- 城門基座 -->
      <rect x="280" y="380" width="80" height="160" class="stone-dark" />

      <!-- 城門磚紋 -->
      <g class="stone-light" opacity="0.6">
        <line x1="280" y1="420" x2="360" y2="420" stroke-width="2" />
        <line x1="280" y1="460" x2="360" y2="460" stroke-width="2" />
        <line x1="280" y1="500" x2="360" y2="500" stroke-width="2" />
        <line x1="310" y1="380" x2="310" y2="540" stroke-width="2" />
        <line x1="340" y1="380" x2="340" y2="540" stroke-width="2" />
      </g>

      <!-- 拱形城門框 -->
      <g>
        <!-- 拱形邊框（左邊） -->
        <line x1="300" y1="440" x2="300" y2="500" stroke="#2a2a2a" stroke-width="3" />
        <!-- 拱形邊框（上邊） -->
        <path d="M 300 440 Q 320 420 340 440" stroke="#2a2a2a" stroke-width="3" fill="none" />
        <!-- 拱形邊框（右邊） -->
        <line x1="340" y1="440" x2="340" y2="500" stroke="#2a2a2a" stroke-width="3" />
      </g>

      <!-- 木質城門 -->
      <g>
        <!-- 門框 -->
        <rect x="302" y="442" width="36" height="56" class="wood-brown" />
        <!-- 木板紋路（橫向） -->
        <line x1="302" y1="452" x2="338" y2="452" stroke="#5a3a1a" stroke-width="2" />
        <line x1="302" y1="462" x2="338" y2="462" stroke="#5a3a1a" stroke-width="2" />
        <line x1="302" y1="472" x2="338" y2="472" stroke="#5a3a1a" stroke-width="2" />
        <line x1="302" y1="482" x2="338" y2="482" stroke="#5a3a1a" stroke-width="2" />
        <!-- 門環 -->
        <circle cx="329" cy="480" r="2" class="stone-light" />
      </g>
    </g>

    <!-- 第二層：塔身層 -->
    <g id="tower-body">
      <!-- 塔身 -->
      <rect x="290" y="220" width="60" height="160" class="stone-dark" />

      <!-- 塔身磚紋 -->
      <g class="stone-light" opacity="0.6">
        <line x1="290" y1="260" x2="350" y2="260" stroke-width="1" />
        <line x1="290" y1="300" x2="350" y2="300" stroke-width="1" />
        <line x1="290" y1="340" x2="350" y2="340" stroke-width="1" />
        <line x1="310" y1="220" x2="310" y2="380" stroke-width="1" />
        <line x1="330" y1="220" x2="330" y2="380" stroke-width="1" />
      </g>

      <!-- 腰部裝飾橫帶 -->
      <rect x="280" y="310" width="80" height="8" class="band-color" />
      <line x1="280" y1="312" x2="360" y2="312" stroke="#8a4a1a" stroke-width="1" />
      <line x1="280" y1="314" x2="360" y2="314" stroke="#8a4a1a" stroke-width="1" />
    </g>

    <!-- 第三層：瞭望台 -->
    <g id="watch-tower">
      <!-- 瞭望台底座 -->
      <rect x="275" y="160" width="90" height="60" class="stone-pale" />

      <!-- 瞭望台磚紋 -->
      <g class="stone-light" opacity="0.5">
        <line x1="275" y1="190" x2="365" y2="190" stroke-width="1" />
        <line x1="275" y1="220" x2="365" y2="220" stroke-width="1" />
        <line x1="305" y1="160" x2="305" y2="220" stroke-width="1" />
        <line x1="335" y1="160" x2="335" y2="220" stroke-width="1" />
      </g>

      <!-- 窗洞（細柱） -->
      <!-- 左第1個 -->
      <rect x="285" y="175" width="8" height="12" class="stone-dark" />
      <!-- 左第2個 -->
      <rect x="300" y="175" width="8" height="12" class="stone-dark" />
      <!-- 中間窗 -->
      <rect x="315" y="175" width="10" height="12" class="stone-dark" />
      <!-- 右第2個 -->
      <rect x="332" y="175" width="8" height="12" class="stone-dark" />
      <!-- 右第1個 -->
      <rect x="347" y="175" width="8" height="12" class="stone-dark" />
    </g>

    <!-- 圓錐形尖頂 -->
    <g id="cone-roof">
      <!-- 尖頂陰影層 -->
      <!-- 最深層（黑邊） -->
      <polygon points="320,160 270,160 285,80 320,50 355,80 370,160" class="roof-dark" />
      <!-- 中層（紅色） -->
      <polygon points="318,162 272,162 285,85 318,52 351,85 368,162" class="roof-mid" />
      <!-- 淺層（橘色） -->
      <polygon points="316,164 274,164 286,90 316,54 346,90 366,164" class="roof-light" />
      <!-- 最淺層（淡橘色） -->
      <polygon points="314,166 276,166 287,95 314,56 341,95 364,166" class="roof-pale" />

      <!-- 像素鋸齒邊緣強調 -->
      <g stroke="#5a2a1a" stroke-width="1" fill="none">
        <polyline points="270,160 285,80 320,50 355,80 370,160" />
      </g>
    </g>
  </g>

  <!-- ═══ 右城牆 ═══════════════════════════════════════ -->
  <g id="right-wall">
    <!-- 城牆主體 -->
    <rect x="360" y="360" width="80" height="180" class="stone-dark" />

    <!-- 磚塊紋路 -->
    <g class="stone-light" opacity="0.6">
      <line x1="360" y1="400" x2="440" y2="400" stroke-width="2" />
      <line x1="360" y1="440" x2="440" y2="440" stroke-width="2" />
      <line x1="360" y1="480" x2="440" y2="480" stroke-width="2" />
      <line x1="360" y1="520" x2="440" y2="520" stroke-width="2" />
      <line x1="400" y1="360" x2="400" y2="540" stroke-width="2" />
    </g>
  </g>

  <!-- ═══ 右角樓 ═══════════════════════════════════════ -->
  <g id="right-corner-tower">
    <!-- 塔身（深灰磚） -->
    <rect x="440" y="300" width="120" height="240" class="stone-dark" />

    <!-- 磚塊紋路 -->
    <g class="stone-light" opacity="0.6">
      <!-- 水平磚線 -->
      <line x1="440" y1="340" x2="560" y2="340" stroke-width="2" />
      <line x1="440" y1="380" x2="560" y2="380" stroke-width="2" />
      <line x1="440" y1="420" x2="560" y2="420" stroke-width="2" />
      <line x1="440" y1="460" x2="560" y2="460" stroke-width="2" />
      <line x1="440" y1="500" x2="560" y2="500" stroke-width="2" />
      <line x1="440" y1="540" x2="560" y2="540" stroke-width="2" />
      <!-- 垂直磚線 -->
      <line x1="480" y1="300" x2="480" y2="540" stroke-width="2" />
      <line x1="520" y1="300" x2="520" y2="540" stroke-width="2" />
    </g>

    <!-- 城垛（上方鋸齒） -->
    <g class="stone-dark">
      <!-- 齒 1 -->
      <rect x="440" y="260" width="40" height="40" />
      <!-- 齒 2 -->
      <rect x="480" y="260" width="30" height="40" />
      <!-- 齒 3 -->
      <rect x="520" y="260" width="30" height="40" />
    </g>
    <!-- 城垛縫隙 -->
    <g class="bg">
      <rect x="470" y="260" width="10" height="40" />
      <rect x="510" y="260" width="10" height="40" />
    </g>
  </g>

  <!-- ═══ 整體邊框 ═══════════════════════════════════════ -->
  <rect x="0" y="0" width="640" height="640" fill="none" stroke="#808080" stroke-width="2" />
</svg>
