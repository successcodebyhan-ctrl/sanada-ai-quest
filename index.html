<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>真田幸村的AI征途</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- 手機直拿時提示橫放（純 CSS 依螢幕方向顯示） -->
  <div id="rotate-prompt">
    <div class="rotate-inner">
      <div class="rotate-icon">📱↻</div>
      <p>請將手機橫放<br>以獲得最佳遊戲畫面</p>
    </div>
  </div>

  <!-- 登入狀態列（右上角） -->
  <div id="auth-status"></div>

  <!-- 登入 / 註冊畫面 -->
  <div id="auth-overlay">
    <div id="auth-box">
      <h1>真田幸村的AI征途</h1>
      <p class="auth-sub">登入以跨裝置同步進度</p>
      <input id="auth-email" type="email" placeholder="Email" autocomplete="email">
      <input id="auth-password" type="password" placeholder="密碼（至少6字）" autocomplete="current-password">
      <div id="auth-error"></div>
      <button id="auth-login-btn" class="auth-primary">登入</button>
      <button id="auth-signup-btn" class="auth-secondary">註冊新帳號</button>
      <button id="auth-guest-btn" class="auth-link">先試玩（不同步）</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="game.js"></script>
  <script src="cloud-save.js"></script>
</body>
</html>
